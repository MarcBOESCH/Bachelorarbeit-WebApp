{% extends "base.html" %}

{% block title %}Historie - Jass App{% endblock %}

{% block content %}
    <h1 class="fw-bold mb-4">Matchhistorie</h1>

    <div class="card shadow-sm">
        <div class="card-body">
            <div id="match-history-empty" class="text-muted">
                Noch keine Matches gespeichert.
            </div>

            <div class="table-responsive d-none" id="match-history-wrapper">
                <table class="table align-middle mb-0">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Zeitpunkt</th>
                            <th>Team A</th>
                            <th>Team B</th>
                            <th>Score</th>
                            <th>Diff.</th>
                            <th>Sieger</th>
                        </tr>
                    </thead>
                    <tbody id="match-history-body"></tbody>
                </table>
            </div>
        </div>
    </div>
{% endblock %}

{% block page_scripts %}
    <script src="{{ url_for('static', filename='js/pages/history.js') }}"></script>
{% endblock %}
