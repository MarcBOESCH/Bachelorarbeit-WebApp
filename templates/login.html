<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - JassTistic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light">

    <div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
        <div class="card shadow-lg border-0" style="max-width: 400px; width: 100%; border-radius: var(--radius-lg);">
            <div class="card-body p-5 text-center">

                <div class="mb-4">
                    <i class="bi bi-suit-spade-fill display-1" style="color: var(--color-brand-dark);"></i>
                </div>

                <h2 class="fw-bold mb-4">JassTistics</h2>

                {% if error %}
                    <div class="alert alert-danger py-2 fw-semibold">{{ error }}</div>
                {% endif %}

                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-4">
                        <input type="password" name="pin" class="form-control form-control-lg text-center fs-3 fw-bold"
                               placeholder="PIN Code" pattern="[0-9]*" inputmode="numeric" autofocus required
                               style="letter-spacing: 4px;">
                    </div>
                    <button type="submit" class="btn w-100 btn-lg text-white fw-bold" style="background-color: var(--color-brand-dark);">
                        Entsperren
                    </button>
                </form>

            </div>
        </div>
    </div>

</body>
</html>
