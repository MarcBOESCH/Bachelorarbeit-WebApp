<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jass Scoring App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <main class="container py-5">
        <div class="text-center mb-5">
            <h1 class="fw-bold">Jass Scoring App</h1>
            <p class="text-muted mb-0">Punkte zählen für ein laufendes Match</p>
        </div>

        <div class="row g-4">
            <div class="col-md-6">
                <div class="card shadow-sm h-100 score-card">
                    <div class="card-body text-center">
                        <h2 class="card-title mb-3">Team A</h2>
                        <div id="score-a" class="display-2 fw-bold mb-4">0</div>

                        <div class="d-flex flex-wrap gap-2 justify-content-center mb-3">
                            <button class="btn btn-primary score-btn" data-team="A" data-points="1">+1</button>
                            <button class="btn btn-primary score-btn" data-team="A" data-points="10">+10</button>
                            <button class="btn btn-primary score-btn" data-team="A" data-points="20">+20</button>
                            <button class="btn btn-primary score-btn" data-team="A" data-points="50">+50</button>
                        </div>

                        <button class="btn btn-outline-secondary subtract-btn" data-team="A">-1</button>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card shadow-sm h-100 score-card">
                    <div class="card-body text-center">
                        <h2 class="card-title mb-3">Team B</h2>
                        <div id="score-b" class="display-2 fw-bold mb-4">0</div>

                        <div class="d-flex flex-wrap gap-2 justify-content-center mb-3">
                            <button class="btn btn-danger score-btn" data-team="B" data-points="1">+1</button>
                            <button class="btn btn-danger score-btn" data-team="B" data-points="10">+10</button>
                            <button class="btn btn-danger score-btn" data-team="B" data-points="20">+20</button>
                            <button class="btn btn-danger score-btn" data-team="B" data-points="50">+50</button>
                        </div>

                        <button class="btn btn-outline-secondary subtract-btn" data-team="B">-1</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm mt-4">
            <div class="card-body">
                <div class="row text-center">
                    <div class="col-md-4 mb-3 mb-md-0">
                        <h5>Team A</h5>
                        <p id="summary-a" class="fs-4 fw-semibold mb-0">0</p>
                    </div>
                    <div class="col-md-4 mb-3 mb-md-0">
                        <h5>Punktedifferenz</h5>
                        <p id="point-diff" class="fs-4 fw-semibold mb-0">0</p>
                    </div>
                    <div class="col-md-4">
                        <h5>Team B</h5>
                        <p id="summary-b" class="fs-4 fw-semibold mb-0">0</p>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <p class="mb-3">
                        Führend:
                        <span id="leader" class="fw-bold">-</span>
                    </p>
                    <button id="reset-btn" class="btn btn-warning">Punkte zurücksetzen</button>
                </div>
            </div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
