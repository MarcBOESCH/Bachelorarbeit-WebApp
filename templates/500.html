{% extends "base.html" %}

{% block title %}Serverfehler - JassTistic{% endblock %}

{% block content %}
    <section class="page-header">
        <h1>500</h1>
        <p>Es ist ein interner Fehler aufgetreten.</p>
    </section>

    <section class="app-card section-spacing">
        <div class="app-card-body text-center">
            <div class="mb-3">
                <i class="bi bi-exclamation-triangle display-4" style="color: var(--color-warning);"></i>
            </div>

            <h2 class="mb-2">Da ist etwas schiefgelaufen</h2>
            <p class="text-muted mb-4">
                Bitte versuche es erneut. Falls der Fehler bleibt, starte die Seite neu.
            </p>

            <div class="action-group">
                <a href="{{ url_for('matches.player_selection_page') }}" class="btn btn-dark">
                    Zur Match-Auswahl
                </a>
            </div>
        </div>
    </section>
{% endblock %}
