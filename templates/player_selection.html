{% extends "base.html" %}

{% block title %}Spielerauswahl - Jass App{% endblock %}

{% block content %}
    <section class="page-header">
        <h1>Neues Match</h1>
    </section>

    <form id="player-selection-form" class="section-spacing">
        <div class="stack-lg section-spacing">
            <section class="app-card">
                <div class="app-card-body">
                    <div class="section-header">
                        <h2 class="text-center">Team A</h2>
                    </div>

                    <div class="team-setup">
                        <div class="form-group">
                            <label for="team-name-a" class="form-label">Teamname</label>
                            <input
                                id="team-name-a"
                                name="team_name_a"
                                type="text"
                                class="form-control"
                                maxlength="30"
                                placeholder="z. B. Stichjäger (optional)"
                            >
                        </div>

                        <div class="form-group">
                            <label for="team-a-player-1" class="form-label">Spieler 1</label>
                            <select id="team-a-player-1" name="team_a_player_1" class="form-select" required>
                                <option value="">Bitte Spieler wählen</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="team-a-player-2" class="form-label">Spieler 2</label>
                            <select id="team-a-player-2" name="team_a_player_2" class="form-select" required>
                                <option value="">Bitte Spieler wählen</option>
                            </select>
                        </div>
                    </div>
                </div>
            </section>

            <section class="app-card">
                <div class="app-card-body">
                    <div class="section-header">
                        <h2 class="text-center">Team B</h2>
                    </div>

                    <div class="team-setup">
                        <div class="form-group">
                            <label for="team-name-b" class="form-label">Teamname</label>
                            <input
                                id="team-name-b"
                                name="team_name_b"
                                type="text"
                                class="form-control"
                                maxlength="30"
                                placeholder="z. B. Trumpfmeister (optional)"
                            >
                        </div>

                        <div class="form-group">
                            <label for="team-b-player-1" class="form-label">Spieler 1</label>
                            <select id="team-b-player-1" name="team_b_player_1" class="form-select" required>
                                <option value="">Bitte Spieler wählen</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="team-b-player-2" class="form-label">Spieler 2</label>
                            <select id="team-b-player-2" name="team_b_player_2" class="form-select" required>
                                <option value="">Bitte Spieler wählen</option>
                            </select>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <section class="app-card">
            <div class="app-card-body">

                <div id="player-selection-message" class="alert d-none" role="alert"></div>

                <div class="action-group">
                    <button id="start-match-btn" type="submit" class="btn btn-dark">
                        Match starten
                    </button>
                </div>
            </div>
        </section>
    </form>
{% endblock %}

{% block page_scripts %}
    <script src="{{ url_for('static', filename='js/pages/player_selection.js') }}"></script>
{% endblock %}
