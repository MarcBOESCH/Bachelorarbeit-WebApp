{% extends "base.html" %}

{% block title %}Spielerauswahl - Jass App{% endblock %}

{% block content %}
    <section class="page-header">
        <h1>Neues Match</h1>
    </section>

    <form id="player-selection-form" class="section-spacing">
        <div class="stack-lg section-spacing">
            <section class="app-card">
                <div class="app-card-body">
                    <div class="section-header d-flex justify-content-between align-items-center justify-content-center">
                        <h2 class="mb-0 text-center">Team A</h2>
                    </div>

                    <div class="team-setup mt-3">
                        <div class="form-group">
                            <label for="team-a-select" class="form-label">Team wählen</label>
                            <select id="team-a-select" name="team_a_id" class="form-select" required>
                                <option value="">Team suchen...</option>
                            </select>
                        </div>

                        <div id="team-a-players-info" class="small text-muted mt-2 d-none">
                            <i class="bi bi-people-fill"></i> Spieler: <span class="fw-semibold player-names"></span>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-center mb-3">
                    <button type="button" class="btn btn-sm btn-outline-dark" onclick="openNewTeamModal('A')">
                        <i class="bi bi-plus-lg"></i> Neues Team
                    </button>
                </div>

            </section>

            <section class="app-card">
                <div class="app-card-body">
                    <div class="section-header d-flex">
                        <h2 class="mb-0 text-center">Team B</h2>
                    </div>

                    <div class="team-setup mt-3">
                        <div class="form-group">
                            <label for="team-b-select" class="form-label">Team wählen</label>
                            <select id="team-b-select" name="team_b_id" class="form-select" required>
                                <option value="">Team suchen...</option>
                            </select>
                        </div>

                        <div id="team-b-players-info" class="small text-muted mt-2 d-none">
                            <i class="bi bi-people-fill"></i> Spieler: <span class="fw-semibold player-names"></span>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-center mb-3">
                    <button type="button" class="btn btn-sm btn-outline-dark" onclick="openNewTeamModal('B')">
                        <i class="bi bi-plus-lg"></i> Neues Team
                    </button>
                </div>
            </section>

        </div>

        <section class="app-card">
            <div class="app-card-body">

                <div id="player-selection-message" class="alert d-none" role="alert"></div>

                <div class="action-group">
                    <button id="start-match-btn" type="submit" class="btn btn-dark">
                        Match starten
                    </button>
                </div>
            </div>
        </section>
    </form>

    <div class="modal fade" id="newTeamModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Neues Team gründen</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Schließen"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Teamname</label>
                        <input type="text" id="new-team-name" class="form-control" placeholder="z.B. Die Kreuzbuben" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Spieler 1</label>
                        <select id="new-team-p1" class="form-select" required></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Spieler 2</label>
                        <select id="new-team-p2" class="form-select" required></select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Abbrechen</button>
                    <button type="button" class="btn btn-dark" id="save-new-team-btn">Team speichern</button>
                </div>
            </div>
        </div>
    </div>
{% endblock %}

{% block page_scripts %}
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
    <script src="{{ url_for('static', filename='js/pages/player_selection.js') }}"></script>
{% endblock %}
